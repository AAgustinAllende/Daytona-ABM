<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="../styles.css">

    <link rel="stylesheet" href="./productos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="shortcut icon" href="../assets/daytona.png" type="image/x-icon">

    <title>ABM|Productos</title>
</head>

<body>
    <header>

        <nav class="navbar" role="navigation" aria-label="main navigation">
            <div class="navbar-brand">
                <img src="../assets/daytona.png" width="170px" height="auto" alt="">

                <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
                    data-target="navbarBasicExample">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <div id="navbarBasicExample" class="navbar-menu">
                <div class="navbar-start">

                    <a class="navbar-item" href="../clientes/clientes.html">
                        Clientes
                    </a>
                    <a class="navbar-item" href="../proveedores/proveedores.html">
                        Proveedores
                    </a>
                    <a class="navbar-item" href="../productos/productos.html">
                        Productos
                    </a>
                    <a class="navbar-item" href="../ventas/ventas.html">
                        Ventas
                    </a>

                </div>


            </div>
        </nav>
    </header>
    <main>
        <section>
            <h2>Registrar producto</h2>
            <input class="input" id="Codigo" placeholder="Codigo" disabled />
            <input class="input" id="Descripcion" placeholder="Descripcion" />
            <div class="select is-rounded">
                <select id="Categoria">
                    <option>Seleccionar categoria</option>

                </select>
            </div>
            <p></p>
            <input class="input" id="Precio" placeholder="$" />
            <input class="input" id="Stock" placeholder="Stock" />
            <div class="select is-rounded">
                <select id="Proveedor">
                    <option value="">Seleccionar proveedor</option>

                </select>
            </div>
            <p></p>
            <div class="form-check form-switch checked">
                <input class="form-check-input" type="checkbox" id="flexSwitchCheckCheckedDisabled" checked disabled>
                <label class="form-check-label" for="flexSwitchCheckCheckedDisabled">Activo</label>
            </div>
            <p></p>
            <button onclick="guardarProducto()" class="btn btn-info">Guardar</button>
            <button onclick="listarProductos()" class="btn btn-info">Listar</button>
            <button onclick="listarProductosInactivos()" class="btn btn-info">Mostrar productos inactivos</button>

        </section>
        <p></p>
        <section>
            <input type="text" id="buscadorProductos" class="input" placeholder="Buscar producto..."
                oninput="filtrarProductos()" />
        </section>
        <section>
            <div class="overflow-x-auto">
                <table class="table" id="tablaProductos">
                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Codigo</th>
                            <th scope="col">Descripción</th>
                            <th scope="col">Categoria</th>
                            <th scope="col">Precio</th>
                            <th scope="col">Stock</th>
                            <th scope="col">Proveedor</th>
                            <th scope="col">Activo</th>

                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="productos.js"></script>

</body>

</html>
