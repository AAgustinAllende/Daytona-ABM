<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles.css">

  <link rel="stylesheet" href="./proveedores.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/daytona.png" type="image/x-icon">

  <title>ABM|Proveedores</title>
</head>

<body>
  <header>
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
        <img src="../assets/daytona.png" width="170px" height="auto" alt="">


        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">
        <div class="navbar-start">


          <a class="navbar-item" href="../clientes/clientes.html">
            Clientes
          </a>
          <a class="navbar-item" href="../proveedores/proveedores.html">
            Proveedores
          </a>
          <a class="navbar-item" href="../productos/productos.html">
            Productos
          </a>
          <a class="navbar-item" href="../ventas/ventas.html">
            Ventas
          </a>

        </div>


      </div>
    </nav>
  </header>
  <main>
    <section>
      <h2>Registrar Proveedor</h2>
      <div class="form-proveedor">
        <input type="text" id="Razon_social" placeholder="Nombre" class="input" />
        <input type="text" id="CUIT" placeholder="CUIT" class="input" />
        <p></p>
        <input type="email" id="Email" placeholder="Correo electrónico" class="input" />
        <input type="text" id="Telefono" placeholder="Telefono" class="input" />
        <p></p>
        <div class="select is-rounded">
          <select name="Provincia" id="Provincia">
            <option>Seleccionar provincia</option>

          </select>
        </div>
        <div class="select is-rounded">
          <select name="Localidad" id="Localidad">
            <option>Seleccionar localidad</option>

          </select>
        </div>


        <p></p>
        <input type="text" id="Calle" placeholder="Calle" class="input" />
        <input type="text" id="Numero" placeholder="Numero" class="input" />
        <input type="text" id="Piso" placeholder="Piso" class="input" />
        <input type="text" id="Dpto" placeholder="Dpto" class="input" />
        <p></p>
        <div class="active-date">
          <input type="date" id="fecha_alta" placeholder="Fecha" class="input" />
          <div class="form-check form-switch checked">
            <input class="form-check-input" type="checkbox" id="flexSwitchCheckCheckedDisabled" checked disabled>
            <label class="form-check-label" for="flexSwitchCheckCheckedDisabled">Activo</label>
          </div>
        </div>
        <p></p>
        <button class="btn btn-info" onclick="guardarProveedor()" class="btn btn-outline btn-accent">Guardar</button>
        <button class="btn btn-info" onclick="listarProveedores()" class="btn btn-outline btn-accent">Listar</button>
        <button class="btn btn-info" onclick="listarProveedoresInactivos()" class="btn btn-outline btn-accent">Ver
          proveedores
          inactivos</button>
      </div>
    </section>
    <p></p>
    <section>
      <input type="text" id="buscadorProveedor" placeholder="Buscar por nombre, CUIT o email..." class="input"
        onkeyup="filtrarProveedores()" />
    </section>
    <p></p>
    <section>
      <p></p>
      <div class="overflow-x-auto">
        <table class="table" id="tablaProveedores">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Razon Social</th>
              <th scope="col">CUIT</th>
              <th scope="col">Telefono</th>
              <th scope="col">Email</th>
              <th scope="col">Provincia</th>
              <th scope="col">Localidad</th>
              <th scope="col">Calle</th>
              <th scope="col">Nro</th>
              <th scope="col">Piso</th>
              <th scope="col">Dpto</th>
              <th scope="col">Fecha alta</th>
              <th scope="col">Activo</th>
            </tr>
          </thead>
          <tbody>

          </tbody>
        </table>
      </div>
    </section>

  </main>




  <script src="./proveedores.js"></script>
</body>

</html>
