<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="../styles.css">

    <link rel="stylesheet" href="ventas.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="shortcut icon" href="../assets/daytona.png" type="image/x-icon">

    <title>Ventas|Detalle</title>
</head>

<body>
    <header>
    
    <nav class="navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
          <img src="../assets/daytona.png" width="170px" height="auto" alt="">



    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>

  <div id="navbarBasicExample" class="navbar-menu">
    <div class="navbar-start">
      

      <a class="navbar-item" href="../clientes/clientes.html">
        Clientes
      </a>
<a class="navbar-item" href="../proveedores/proveedores.html">
        Proveedores
      </a>
      <a class="navbar-item" href="../productos/productos.html">
        Productos
      </a>
      <a class="navbar-item" href="../ventas/ventas.html">
        Ventas
      </a>
      
    </div>

    
  </div>
</nav>
  </header>
    <main>
        <h2>Ventas</h2>
        <section class="filter">
            <div class="desde-filter">
                <label>Desde:</label>
                <input type="date" id="fechaDesde" class="input" />
            </div>
            <p></p>
            <div class="hasta-filter">
                <label>Hasta:</label>
                <input type="date" id="fechaHasta" class="input" />
            </div>
            <button class="btn btn-info" onclick="filtrarVentas()">Filtrar</button>
        </section>


        <hr>

        <table class="table">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Cliente</th>
                    <th scope="col">Fecha</th>
                    <th scope="col">Total</th>
                    <th scope="col">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>

        <hr>

        <!-- DETALLE -->
        <h3>Detalle de venta</h3>
        <table class="table">
            <thead>
                <tr>
                    <th scope="col">Producto</th>
                    <th scope="col">Cantidad</th>
                    <th scope="col">Precio</th>
                    <th scope="col">Subtotal</th>
                </tr>
            </thead>
            <tbody id="detalleVenta"></tbody>
        </table>

        <button class="btn btn-info" onclick="imprimirDetalle()">🧾 Imprimir</button>

        <hr>

        <!-- STATS -->
        <h3>Estadísticas</h3>
        <p>Total vendido: $<span id="totalGeneral">0</span></p>
        <p>Cantidad de ventas: <span id="cantidadVentas">0</span></p>

        <h3>Productos vendidos</h3>
        <ul id="ranking"></ul>


    </main>
    <script src="./ventas-detalle.js"></script>
</body>

</html>
