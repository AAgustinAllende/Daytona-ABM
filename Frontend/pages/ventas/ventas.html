<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../styles.css">

  <link rel="stylesheet" href="ventas.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/daytona.png" type="image/x-icon">

  <title>Daytona|Ventas</title>
</head>

<body>
  <header>
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-brand">
              <img src="../assets/daytona.png" width="170px" height="auto" alt="">
        

        <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </a>
      </div>

      <div id="navbarBasicExample" class="navbar-menu">
        <div class="navbar-start">
          

          <a class="navbar-item" href="../clientes/clientes.html">
            Clientes
          </a>
          <a class="navbar-item" href="../proveedores/proveedores.html">
            Proveedores
          </a>
          <a class="navbar-item" href="../productos/productos.html">
            Productos
          </a>
          <a class="navbar-item" href="../ventas/ventas.html">
            Ventas
          </a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <h2>Nueva Venta</h2>
    <div class="main-form">
      <div class="client">
        <label>Cliente:</label>
        <div class="select is-rounded select-client">
          <select id="cliente">
            <option>Seleccionar cliente</option>

          </select>
        </div>
      </div>

      <hr>

      <h3>Agregar producto</h3>

      <div class="form-product">
        <div class="select is-rounded">
          <select id="producto">
            <option>Seleccionar producto</option>

          </select>
        </div>
        <input type="number" id="cantidad" placeholder="Cantidad" class="input" min="1" />
        <button class="btn btn-info" onclick="agregarProducto()">Agregar</button>
      </div>
    </div>


    <hr>

    <h3>Venta</h3>
    <button class="btn btn-info" onclick="historialVentas()">ver historial de ventas</button>

    <table class="table">
      <thead>
        <tr>
          <th scope="col">Producto</th>
          <th scope="col">Cantidad</th>
          <th scope="col">Precio</th>
          <th scope="col">Subtotal</th>
          <th scope="col">Acciones</th>
        </tr>
      </thead>
      <tbody id="detalle"></tbody>
    </table>

    <h3>Total: $<span id="total">0</span></h3>

    <button class="btn btn-info" onclick="guardarVenta()">Confirmar Venta</button>
  </main>


  <script src="./ventas.js"></script>
</body>

</html>
